services:
  - type: web
    name: nextstep-website
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nextstep-db
          property: connectionString
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: OWNER_EMAIL
        value: raj.nextstepoutsourcing@gmail.com
      - key: OWNER_PASSWORD
        sync: false
      - key: OWNER_NAME
        value: Raj
      - key: TOOL_URL_CHECKLIST
        sync: false

databases:
  - name: nextstep-db
    databaseName: nextstep
    user: nextstep
